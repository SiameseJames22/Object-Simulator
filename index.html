<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BFDI Simulator Hub</title>
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/components.css">
    <link rel="stylesheet" href="src/css/animations.css">
</head>
<body class="theme-dark">

    <!-- Top Navigation Bar -->
    <nav class="glass-nav">
        <div class="nav-left">
            <!-- Profile Icon System -->
            <div class="profile-container" id="profile-btn">
                <img src="assets/default-avatar.png" alt="Profile" class="profile-icon">
                
                <!-- Not Logged In Dropdown -->
                <div class="profile-menu glass-card" id="menu-logged-out" style="display: none;">
                    <p>You are currently not signed in.</p>
                    <button class="btn-primary" onclick="openAuth('login')">Log In</button>
                    <button class="btn-secondary" onclick="openAuth('signup')">Sign Up</button>
                </div>

                <!-- Logged In Dropdown -->
                <div class="profile-menu glass-card" id="menu-logged-in" style="display: none;">
                    <h3 id="display-username">Username</h3>
                    <button class="btn-ghost" onclick="navTo('my-account')">My Account</button>
                    <button class="btn-ghost" onclick="navTo('my-shows')">My Shows</button>
                    <button class="btn-ghost" onclick="navTo('my-creations')">My Creations</button>
                    <button class="btn-ghost" onclick="navTo('settings')">Settings</button>
                    <hr>
                    <button class="btn-danger" onclick="logoutUser()">Log Out</button>
                </div>
            </div>
        </div>

        <div class="nav-center">
            <button class="nav-tab active" onclick="navTo('home')">Home</button>
            <button class="nav-tab" onclick="navTo('shows')">Shows</button>
            <button class="nav-tab" onclick="navTo('creator')">Creator</button>
            <button class="nav-tab" onclick="navTo('settings')">Settings</button>
            <button class="nav-tab" onclick="navTo('notifications')">Notifications <span class="badge">3</span></button>
            <button class="nav-tab" onclick="navTo('messages')">Messages</button>
        </div>
    </nav>

    <!-- Hidden Admin Panel Button (Appears only for robloxworld607@gmail.com) -->
    <button id="admin-panel-btn" class="btn-admin glowing" style="display: none;" onclick="navTo('admin')">Admin Panel</button>

    <!-- Main Content Area (Simulator screens go here) -->
    <main id="app-content">
        <!-- The simulator screens from your original code will be injected here -->
    </main>

    <script src="src/js/ui/navigation.js"></script>
    <script src="src/js/auth/auth.js"></script>
</body>
</html>
